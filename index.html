<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClientPro Quản Lý Khách Hàng</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <meta name="theme-color" content="#ffffff">

    <link rel="stylesheet" href="Css/style.css"> 
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p class="loading-text">ĐANG TẢI DỮ LIỆU...</p>
    </div>

    <div class="app-container">
        
        <header>
            <div class="logo-area">
                <div class="app-icon">
                    <img src="icon-192.png" alt="Logo" style="width: 100%; height: 100%; border-radius: 50%;">
                </div>
                <h1 class="app-title">ClientPro Quản Lý Khách Hàng</h1>
            </div>
            <button id="btn-donate" class="header-btn"><i class="fa-solid fa-heart"></i></button>
        </header>

        <div class="weather-widget">
            <span id="weather-info">Đang cập nhật thời tiết...</span>
        </div>

        <div class="tabs-container">
            <button class="tab-btn active" id="tab-tham-dinh">KH ĐANG THẨM ĐỊNH</button>
            <button class="tab-btn" id="tab-da-vay">KHÁCH HÀNG ĐÃ VAY</button>
        </div>

        <div class="search-container">
            <input type="text" id="search-input" placeholder="Tìm kiếm hồ sơ (Tên, SĐT)">
            <button id="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>

        <div id="customer-list" class="customer-list"></div>

        <footer>
            <p>&copy; 2025 ClientPro App</p>
            <p class="signature">Phát triển bởi <strong>Nguyễn Quốc Hưng</strong></p>
        </footer>

        <button id="fab-add" class="fab"><i class="fa-solid fa-plus"></i></button>

    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .catch(err => console.log('ServiceWorker Error:', err));
        }
    </script>

    <script src="Js/config.js"></script>

    <script src="Js/database.js"></script>
    <script src="Js/security.js"></script>
    <script src="Js/drive.js"></script>
    <script src="Js/map.js"></script>

    <script src="Js/ui.js"></script>

    <script src="Js/app.js"></script>

</body>
</html>
