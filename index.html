                <button onclick="setTheme('theme-sunset')" class="theme-btn w-8 h-8 rounded-full relative overflow-hidden ring-2 ring-transparent active:ring-white transition-all shadow-lg"><div class="absolute inset-0 bg-gradient-to-br from-[#fb923c] via-[#f43f5e] to-[#a855f7]"></div></button>

        </button>

        </button>

        </button>
        <button onclick="openDonateModal()" class="w-full text-left px-5 py-4 active:bg-white/5 flex items-center gap-3 border-b border-white/5 text-sm font-medium transition-colors">

        </button>

        </div>

        <label class="w-full text-left px-5 py-4 active:bg-white/5 flex items-center gap-3 cursor-pointer border-b border-white/5 text-sm font-medium transition-colors">

        </label>
        
        <button onclick="resetAppData()" class="w-full text-left px-5 py-4 active:bg-red-500/10 flex items-center gap-3 text-sm font-bold text-red-400 transition-colors">

        </button>

                <button onclick="toggleMenu()" class="p-2.5 rounded-xl border transition-colors hover:bg-white/10 active:scale-95 border-white/10">
