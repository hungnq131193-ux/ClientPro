<script>
/* SW Hard-Update Guard (GitHub Pages safe) - BUILD 2026-01-21_2005
   - Forces fresh fetch of sw.js
   - Promotes waiting SW immediately (SKIP_WAITING)
   - Reloads on controllerchange so UI/HTML updates apply at once
*/
(function () {
  if (!('serviceWorker' in navigator)) return;
  var BUILD = '2026-01-21_2005';
  var swUrl = './sw.js?v=' + encodeURIComponent(BUILD);

  navigator.serviceWorker.register(swUrl, { scope: './' }).then(function (reg) {
    function promoteWaiting() {
      try {
        if (reg && reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
      } catch (e) {}
    }

    promoteWaiting();

    reg.addEventListener('updatefound', function () {
      var sw = reg.installing;
      if (!sw) return;
      sw.addEventListener('statechange', function () {
        if (sw.state === 'installed') {
          promoteWaiting();
        }
      });
    });
  }).catch(function () {
    // no-op
  });

  navigator.serviceWorker.addEventListener('controllerchange', function () {
    // Prevent reload loops
    if (window.__swReloaded) return;
    window.__swReloaded = true;
    window.location.reload();
  });
})();
</script><script defer="" src="./assets/pwa.js"></script>
