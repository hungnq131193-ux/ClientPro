name: CI

on:
  push:
  pull_request:

jobs:
  static-checks:
    name: Static checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate manifest JSON
        run: python3 -m json.tool manifest.json >/dev/null

      - name: Check JavaScript syntax
        run: |
          node --check sw.js
          find assets -maxdepth 1 -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Ensure edge back-swipe debug scaffold is absent
        run: |
          ! grep -nE 'DEBUG_MODE|clientpro_edgeback_debug_log|clientpro-edgeback-debug|dbg\(' assets/11_edge_back_swipe.js
