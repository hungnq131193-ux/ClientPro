name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-checks:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate JSON files
        run: |
          python3 -m json.tool manifest.json > /dev/null
          python3 -m json.tool vercel.json  > /dev/null

      - name: Check JavaScript syntax
        run: |
          node --check sw.js
          find assets -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Ensure edge back-swipe debug scaffold is absent
        run: |
          if grep -nE 'DEBUG_MODE|clientpro_edgeback_debug_log|clientpro-edgeback-debug|dbg\(' assets/11_edge_back_swipe.js; then
            echo "::error file=assets/11_edge_back_swipe.js::Debug scaffold detected — remove it before merging."
            exit 1
          fi
