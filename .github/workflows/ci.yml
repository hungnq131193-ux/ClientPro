name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-checks:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate JSON files
        run: |
          python3 -m json.tool manifest.json > /dev/null
          python3 -m json.tool vercel.json  > /dev/null

      - name: Check JavaScript syntax
        run: |
          node --check sw.js
          find assets -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Ensure edge back-swipe debug scaffold is absent
        run: |
          if grep -nE 'DEBUG_MODE|clientpro_edgeback_debug_log|clientpro-edgeback-debug|dbg\(' assets/11_edge_back_swipe.js; then
            echo "::error file=assets/11_edge_back_swipe.js::Debug scaffold detected — remove it before merging."
            exit 1
          fi

      - name: Verify version is synchronized across files
        run: |
          set -euo pipefail
          # Phiên bản app (semver): manifest.json = sw.js VERSION = pwa.js SW_BUILD.
          MANIFEST_VER=$(grep -oE '"version"[[:space:]]*:[[:space:]]*"[^"]+"' manifest.json | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          SW_VERSION=$(grep -oE "VERSION[[:space:]]*=[[:space:]]*'v?[0-9.]+'" sw.js | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          PWA_BUILD=$(grep -oE "SW_BUILD[[:space:]]*=[[:space:]]*'v?[0-9.]+'" assets/pwa.js | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          # Cache-buster asset (tag tự do, ví dụ REDESIGN_20260705): sw.js ASSET_V = mọi ?v= trong index.html.
          ASSET_V=$(grep -oE "ASSET_V[[:space:]]*=[[:space:]]*'[^']+'" sw.js | sed -E "s/.*'([^']+)'.*/\1/")
          echo "manifest=$MANIFEST_VER  sw.VERSION=$SW_VERSION  pwa.SW_BUILD=$PWA_BUILD  sw.ASSET_V=$ASSET_V"

          for pair in "manifest:$MANIFEST_VER" "sw.VERSION:$SW_VERSION" "pwa.SW_BUILD:$PWA_BUILD"; do
            name=${pair%%:*}; val=${pair#*:}
            if [ "$val" != "$MANIFEST_VER" ]; then
              echo "::error::Lệch phiên bản: $name=$val nhưng manifest=$MANIFEST_VER"
              exit 1
            fi
          done

          # Mọi query ?v= trong index.html phải trùng ASSET_V (đồng bộ precache SW)
          INDEX_TOKENS=$(grep -oE '\?v=[A-Za-z0-9._-]+' index.html | sed 's/?v=//' | sort -u)
          COUNT=$(printf '%s\n' "$INDEX_TOKENS" | grep -c .)
          if [ "$COUNT" -ne 1 ] || [ "$INDEX_TOKENS" != "$ASSET_V" ]; then
            echo "::error file=index.html::Query ?v= trong index.html phải đồng nhất và bằng ASSET_V ($ASSET_V). Tìm thấy: $INDEX_TOKENS"
            exit 1
          fi

          # 03_map.js lazy-load maplibre với cache-buster riêng -> cũng phải trùng ASSET_V.
          MAP_V=$(grep -oE "MAPLIBRE_V[[:space:]]*=[[:space:]]*'[^']+'" assets/03_map.js | sed -E "s/.*'([^']+)'.*/\1/")
          if [ "$MAP_V" != "$ASSET_V" ]; then
            echo "::error file=assets/03_map.js::MAPLIBRE_V ($MAP_V) phải bằng ASSET_V ($ASSET_V)"
            exit 1
          fi

          # Không còn CDN script/style/font ngoài (đã self-host trong assets/vendor + assets/fonts).
          if grep -nE 'unpkg\.com|cdnjs\.cloudflare\.com|cdn\.jsdelivr\.net|fonts\.googleapis\.com|fonts\.gstatic\.com' index.html vercel.json assets/*.js assets/*.css assets/css/*.css; then
            echo "::error::Phát hiện tham chiếu CDN ngoài — app phải self-host toàn bộ script/style/font."
            exit 1
          fi
          echo "✅ Phiên bản đồng bộ: app=$MANIFEST_VER, asset tag=$ASSET_V"

  tests:
    name: Automated tests (crypto & data integrity)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Không cần `npm install`: bộ test chạy bằng test runner tích hợp của Node
      # (node --test) + node:crypto (WebCrypto) + crypto-js.min.js self-host sẵn.
      # Không thêm dependency, không thêm asset -> không đụng versioning/cache-buster.
      - name: Run test suite (Node built-in runner)
        run: node --test 'tests/**/*.test.js'
