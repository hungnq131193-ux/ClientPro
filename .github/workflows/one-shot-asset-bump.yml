name: One-shot asset cache bump

on:
  push:
    branches:
      - agent/code-cleanup-v1-3-1

permissions:
  contents: write

jobs:
  bump:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync asset cache-buster and remove one-shot workflow
        run: |
          python3 - <<'PY'
          from pathlib import Path

          old = 'DOCS_ONBOARD_20260721'
          new = 'CODE_CLEANUP_20260722'
          paths = [Path('index.html'), Path('assets/03_map.js'), Path('sw.js'), Path('README.md')]

          for path in paths:
              text = path.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'{old} not found in {path}')
              path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          rm .github/workflows/one-shot-asset-bump.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets/03_map.js sw.js README.md .github/workflows/one-shot-asset-bump.yml
          git commit -m "chore: sync asset cache-buster"
          git push origin "HEAD:${GITHUB_REF_NAME}"
