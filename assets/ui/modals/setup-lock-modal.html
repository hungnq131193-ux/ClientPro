<div id="setup-lock-modal" class="cp-modal hidden" role="dialog" aria-modal="true" aria-labelledby="setup-lock-title">
  <div class="cp-modal__backdrop" onclick="closeSetupModal()"></div>
  <div class="cp-modal__panel glass-panel">
    <button type="button" class="cp-modal__close" onclick="closeSetupModal()" aria-label="Đóng">✕</button>

    <div class="cp-modal__header">
      <div class="cp-modal__title" id="setup-lock-title">Thiết lập khóa PIN</div>
      <div class="cp-modal__subtitle">Tạo mã PIN để bảo vệ dữ liệu trên thiết bị này.</div>
    </div>

    <div class="cp-form">
      <label class="cp-label" for="setup-answer">Mã nhân viên</label>
      <input id="setup-answer" class="cp-input" type="text" inputmode="text" autocomplete="username" placeholder="VD: NV001" />

      <label class="cp-label" for="setup-pin" style="margin-top:12px;">Mã PIN (4–8 số)</label>
      <input id="setup-pin" class="cp-input" type="password" inputmode="numeric" autocomplete="new-password" placeholder="Nhập PIN mới" />

      <div class="cp-actions">
        <button type="button" class="glass-btn" onclick="closeSetupModal()">Hủy</button>
        <button type="button" class="glass-btn cp-btn-primary" onclick="saveSecuritySetup()">Lưu &amp; Kích hoạt</button>
      </div>
    </div>
  </div>
</div>
