<div id="forgot-pin-modal" class="cp-modal hidden" role="dialog" aria-modal="true" aria-labelledby="forgot-pin-title">
  <div class="cp-modal__backdrop" onclick="closeForgotModal()"></div>
  <div class="cp-modal__panel glass-panel">
    <button type="button" class="cp-modal__close" onclick="closeForgotModal()" aria-label="Đóng">✕</button>

    <div class="cp-modal__header">
      <div class="cp-modal__title" id="forgot-pin-title">Khôi phục quyền truy cập</div>
      <div class="cp-modal__subtitle">Nhập câu trả lời khôi phục để đặt lại PIN.</div>
    </div>

    <div class="cp-form">
      <label class="cp-label" for="recovery-answer">Câu trả lời khôi phục</label>
      <input id="recovery-answer" class="cp-input" type="text" inputmode="text" autocomplete="off" placeholder="Nhập câu trả lời đã đặt" />

      <div class="cp-actions">
        <button type="button" class="glass-btn" onclick="closeForgotModal()">Hủy</button>
        <button type="button" class="glass-btn cp-btn-primary" onclick="checkRecovery()">Xác nhận</button>
      </div>
    </div>
  </div>
</div>
