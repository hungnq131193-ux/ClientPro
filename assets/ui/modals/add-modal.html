<div id="add-modal" class="fixed inset-0 z-[200] bg-black/80 hidden flex items-center justify-center p-4 backdrop-blur-sm" role="dialog" aria-modal="true" aria-labelledby="modal-title-cust">
        <div class="glass-panel w-full max-w-sm rounded-2xl p-6 shadow-2xl relative modal-animate overflow-y-auto max-h-[90vh] custom-scrollbar">
            <button data-action="closeModal" aria-label="Đóng" class="absolute top-4 right-4" style="color: var(--text-sub)"><i data-lucide="x" class="w-5 h-5"></i></button>
            <h3 class="font-bold text-lg mb-6" id="modal-title-cust" style="color: var(--text-main)">Thêm khách hàng</h3>
            <input type="hidden" id="edit-cust-id">
            <div class="space-y-5">
                <!-- Tên khách hàng -->
                <div>
                    <label for="new-name" class="text-xs font-bold uppercase block mb-1.5 opacity-70" style="color: var(--text-sub)">Tên khách hàng <span class="font-medium normal-case opacity-90">· Bắt buộc</span></label>
                    <input id="new-name" autocomplete="name" enterkeyhint="next" class="w-full border p-3.5 rounded-xl outline-none" style="border-color: var(--border-panel);">
                </div>
                <!-- Số điện thoại -->
                <div>
                    <label for="new-phone" class="text-xs font-bold uppercase block mb-1.5 opacity-70" style="color: var(--text-sub)">Số điện thoại <span class="font-medium normal-case opacity-90">· Không bắt buộc</span></label>
                    <input id="new-phone" type="tel" inputmode="tel" autocomplete="tel" enterkeyhint="next" class="w-full border p-3.5 rounded-xl outline-none" style="border-color: var(--border-panel);">
                </div>
                <!-- CCCD/CMND mới thêm -->
                <div>
                    <label for="new-cccd" class="text-xs font-bold uppercase block mb-1.5 opacity-70" style="color: var(--text-sub)">CCCD / CMND <span class="font-medium normal-case opacity-90">· Không bắt buộc</span></label>
                    <input id="new-cccd" inputmode="numeric" enterkeyhint="done" class="w-full border p-3.5 rounded-xl outline-none" placeholder="Ví dụ: 001099012345" style="border-color: var(--border-panel);">
                </div>
            </div>
            <div class="flex gap-3 mt-8">
                <button data-action="closeModal" class="flex-1 py-3.5 rounded-xl font-medium transition-colors hover:bg-white/5" style="background: rgba(255,255,255,0.05); color: var(--text-sub)">Hủy</button>
                <button data-action="saveCustomer" class="flex-1 py-3.5 text-white font-bold rounded-xl shadow-lg active:scale-[0.98] transition-transform" id="btn-save-cust" style="background: var(--accent-gradient);">Tạo mới</button>
            </div>
        </div>
    </div>
