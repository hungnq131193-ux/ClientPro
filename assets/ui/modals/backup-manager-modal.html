<div id="backup-manager-modal" class="fixed inset-0 z-50 hidden">
  <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeBackupManager()"></div>
  <div class="relative w-full h-full flex items-end sm:items-center justify-center p-3">
    <div class="glass-panel w-full max-w-lg rounded-2xl border border-slate-700 overflow-hidden">
      <!-- Header -->
      <div class="px-5 py-4 flex items-center justify-between border-b border-white/10">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background: var(--accent-gradient);">
            <i data-lucide="archive" class="w-5 h-5 text-white"></i>
          </div>
          <div>
            <h3 class="text-base font-bold" style="color: var(--text-main)">Sao Lưu & Khôi Phục</h3>
            <p class="text-[11px] opacity-60" style="color: var(--text-sub)">Tự động giữ 3 bản gần nhất</p>
          </div>
        </div>
        <button onclick="closeBackupManager()" class="p-2.5 rounded-xl hover:bg-white/10" style="color: var(--text-main)">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>

      <!-- Primary Action: Create Backup -->
      <div class="px-5 py-3 border-b border-white/10">
        <button onclick="backupData()"
          class="w-full py-3.5 rounded-xl font-bold text-white flex items-center justify-center gap-2 active:scale-[0.98] transition-transform shadow-lg"
          style="background: var(--accent-gradient);">
          <i data-lucide="plus" class="w-5 h-5"></i> Tạo Backup Mới
        </button>
      </div>

      <!-- 2 Tabs: Local | Drive -->
      <div class="px-5 pt-3 pb-1 flex gap-2">
        <button id="bkTabLocal" onclick="CloudTransferUI.showTab('local')"
          class="flex-1 py-2.5 rounded-xl text-xs font-extrabold border flex items-center justify-center gap-1.5"
          style="border-color: var(--border-panel); color: var(--text-main); background: rgba(59,130,246,0.18);">
          <i data-lucide="smartphone" class="w-3.5 h-3.5"></i> Trong máy
        </button>
        <button id="bkTabDrive" onclick="showDriveBackupTab()"
          class="flex-1 py-2.5 rounded-xl text-xs font-extrabold border flex items-center justify-center gap-1.5"
          style="border-color: var(--border-panel); color: var(--text-main); background: rgba(255,255,255,0.04);">
          <i data-lucide="cloud" class="w-3.5 h-3.5"></i> Google Drive
        </button>
        <button id="bkTabInbox" onclick="CloudTransferUI.showTab('inbox')"
          class="flex-1 py-2.5 rounded-xl text-xs font-extrabold border flex items-center justify-center gap-1.5 relative"
          style="border-color: var(--border-panel); color: var(--text-main); background: rgba(255,255,255,0.04);">
          <i data-lucide="inbox" class="w-3.5 h-3.5"></i> Nhận
          <span id="inbox-badge" class="px-1.5 py-0.5 rounded-full text-[9px] font-black hidden"
            style="background: rgba(239,68,68,0.25); color: #f87171; border: 1px solid rgba(239,68,68,0.35);">0</span>
        </button>
      </div>

      <!-- Content Panes -->
      <div class="px-5 py-3" style="max-height: 45vh; overflow-y: auto;">
        <!-- LOCAL BACKUP PANE -->
        <div id="local-backup-pane">
          <div id="backup-list" class="space-y-3"></div>
          <div id="backup-empty" class="hidden text-center py-8 opacity-70 text-sm" style="color: var(--text-sub)">
            <i data-lucide="archive" class="w-8 h-8 mx-auto mb-2 opacity-40"></i>
            <p>Chưa có bản backup nào</p>
            <p class="text-[11px] mt-1 opacity-60">Bấm "Tạo Backup Mới" để bắt đầu</p>
          </div>
        </div>

        <!-- INBOX PANE -->
        <div id="inbox-backup-pane" class="hidden">
          <div class="text-[11px] opacity-70 mb-2" style="color: var(--text-sub)">Bản ghi trung chuyển sẽ tự động xóa
            sau 24 giờ.</div>
          <div id="inbox-list" class="space-y-3"></div>
          <div id="inbox-empty" class="hidden text-center py-8 opacity-70 text-sm" style="color: var(--text-sub)">
            <i data-lucide="inbox" class="w-8 h-8 mx-auto mb-2 opacity-40"></i>
            <p>Chưa có bản ghi nào</p>
          </div>
        </div>

        <!-- DRIVE BACKUP PANE -->
        <div id="drive-backup-pane" class="hidden">
          <div class="flex items-center justify-between mb-3">
            <div class="text-[11px] opacity-70" style="color: var(--text-sub)">
              <i data-lucide="cloud" class="w-3 h-3 inline-block mr-1"></i>
              Giữ 3 bản gần nhất trên Drive
            </div>
            <button onclick="DriveBackup.performNow().then(() => DriveBackup.renderList('drive-backup-list'))"
              class="px-3 py-1.5 rounded-lg text-[11px] font-bold"
              style="background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3);">
              <i data-lucide="upload-cloud" class="w-3 h-3 inline-block mr-1"></i>Backup lên Drive
            </button>
          </div>
          <div id="drive-backup-list" class="space-y-3">
            <p class="text-center text-sm opacity-60" style="color: var(--text-sub)">Đang tải...</p>
          </div>
        </div>
      </div>

      <!-- Footer Actions -->
      <div class="px-5 py-3 border-t border-white/10 flex gap-2">
        <label
          class="flex-1 py-3 rounded-xl font-bold text-center cursor-pointer border flex items-center justify-center gap-2 text-xs active:scale-[0.98] transition-transform"
          style="border-color: var(--border-panel); color: var(--text-main); background: rgba(255,255,255,0.04);">
          <i data-lucide="file-up" class="w-4 h-4"></i> Nhập file .cpb
          <input type="file" id="restore-input" accept=".cpb,.cpro" class="hidden" onchange="restoreData(this)" />
        </label>
      </div>
    </div>
  </div>
</div>
