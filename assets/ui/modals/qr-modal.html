<div id="qr-modal" class="fixed inset-0 z-[500] bg-black/95 hidden flex flex-col items-center justify-center p-4 backdrop-blur-sm">
    <div class="relative w-full max-w-sm mx-auto glass-panel p-0 rounded-2xl shadow-2xl overflow-hidden bg-black flex flex-col">
        <button onclick="closeQrScanner()" class="absolute top-4 right-4 z-20 bg-black/40 text-white p-2 rounded-full hover:bg-white/20 backdrop-blur-md border border-white/10">
            <i data-lucide="x" class="w-6 h-6"></i>
        </button>
        
        <div class="relative w-full aspect-square bg-black overflow-hidden">
             <div id="qr-reader" class="w-full h-full"></div>
             
             <div class="absolute inset-0 border-2 border-white/30 pointer-events-none flex items-center justify-center">
                <div class="w-56 h-56 border-2 border-white/80 rounded-lg relative shadow-[0_0_100px_rgba(0,0,0,0.5)]">
                    <div class="absolute top-0 left-0 w-6 h-6 border-t-4 border-l-4 border-emerald-500 -mt-1 -ml-1"></div>

                    <div class="absolute bottom-0 right-0 w-6 h-6 border-b-4 border-r-4 border-emerald-500 -mb-1 -mr-1"></div>
                </div>
            </div>
        </div>
        
        <div class="p-5 bg-slate-900 border-t border-white/10 relative z-10">
            <div class="flex items-center justify-between mb-2">
                <span class="text-xs font-bold text-slate-400">1x</span>

                <span class="text-xs font-bold text-slate-400">4x</span>
            </div>
            <!-- Manual digital zoom slider removed -->
        </div>
