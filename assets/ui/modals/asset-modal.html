<div id="asset-modal" class="fixed inset-0 z-[200] bg-black/80 hidden flex items-center justify-center p-4 backdrop-blur-sm" role="dialog" aria-modal="true" aria-labelledby="modal-title-asset">
        <div class="glass-panel w-full max-w-sm rounded-2xl p-6 shadow-2xl modal-animate overflow-y-auto max-h-[90vh] custom-scrollbar relative">
            <button data-action="closeAssetModal" class="asset-modal-close absolute" style="color: var(--text-sub)" aria-label="Đóng"><i data-lucide="x" class="w-5 h-5"></i></button>
            <h3 class="font-bold mb-4 flex justify-between items-center text-lg pr-10" style="color: var(--text-main)"><span id="modal-title-asset">Thêm tài sản bảo đảm</span><input type="hidden" id="edit-asset-index"></h3>
            <div class="space-y-3">
                <div><label for="asset-name" class="text-[10px] font-bold uppercase opacity-60 ml-1 mb-1 block">Tên / mô tả tài sản</label><input id="asset-name" placeholder="Ví dụ: Quyền sử dụng đất tại..." class="w-full border p-3.5 rounded-xl outline-none" style="border-color: var(--border-panel);"></div>

                <div class="grid grid-cols-2 gap-3">
                    <div><label for="asset-val" class="text-[10px] font-bold uppercase opacity-60 ml-1 mb-1 block">Định giá (triệu đồng)</label><input id="asset-val" type="tel" inputmode="numeric" placeholder="0" class="w-full p-3 rounded-xl border outline-none font-medium" style="border-color: var(--border-panel);"></div>
                    <div><label for="asset-loan" class="text-[10px] font-bold uppercase opacity-60 ml-1 mb-1 block">Giá trị cho vay (triệu đồng)</label><input id="asset-loan" type="tel" inputmode="numeric" placeholder="0" class="w-full p-3 rounded-xl border outline-none font-medium" style="border-color: var(--border-panel);"></div>
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <div><label for="asset-area" class="text-[10px] font-bold uppercase opacity-60 ml-1 mb-1 block">Diện tích (m²)</label><input id="asset-area" type="number" inputmode="decimal" placeholder="Ví dụ: 120" class="w-full p-3 rounded-xl border outline-none" style="border-color: var(--border-panel);"></div>
                    <div><label for="asset-width" class="text-[10px] font-bold uppercase opacity-60 ml-1 mb-1 block">Mặt tiền (m)</label><input id="asset-width" type="number" inputmode="decimal" placeholder="Ví dụ: 5" class="w-full p-3 rounded-xl border outline-none" style="border-color: var(--border-panel);"></div>
                    <div><label for="asset-year" class="text-[10px] font-bold uppercase opacity-60 ml-1 mb-1 block">Năm xây dựng</label><input id="asset-year" type="number" inputmode="numeric" placeholder="Ví dụ: 2020" class="w-full p-3 rounded-xl border outline-none" style="border-color: var(--border-panel);"></div>
                </div>
                <div><label for="asset-onland" class="text-[10px] font-bold uppercase opacity-60 ml-1 mb-1 block">Địa chỉ / công trình trên đất</label><input id="asset-onland" placeholder="Ví dụ: Địa chỉ, công trình xây dựng,..." class="w-full p-3.5 rounded-xl border outline-none" style="border-color: var(--border-panel);"></div>
                                <div>
                    <label for="asset-link" class="text-[10px] font-bold uppercase opacity-60 ml-1 mb-1 block">Tọa độ tài sản</label>
                    <div class="flex gap-2 items-stretch">
                        <input id="asset-link" placeholder="Ví dụ: 21.0285, 105.8542" class="flex-1 min-w-0 h-[52px] p-3.5 rounded-xl text-sm border outline-none" style="border-color: var(--border-panel); background: var(--input-bg); color: var(--text-main);">
                        <button type="button" data-action="openGuideModal" class="w-12 h-[52px] shrink-0 flex items-center justify-center rounded-xl border active:scale-95 transition" style="border-color: var(--border-panel); background: var(--input-bg); color: var(--text-sub);" aria-label="Hướng dẫn lấy tọa độ" title="Hướng dẫn lấy tọa độ">
                            <i data-lucide="help-circle" class="w-5 h-5"></i>
                        </button>
                        <button type="button" data-action="getCurrentGPS" class="w-12 h-[52px] shrink-0 flex items-center justify-center rounded-xl border active:scale-95 transition" style="border-color: var(--border-panel); background: var(--input-bg); color: var(--text-sub);" aria-label="Lấy tọa độ GPS" title="Lấy tọa độ GPS">
                            <i data-lucide="map-pin" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div class="flex gap-3 mt-8">
                <button data-action="closeAssetModal" class="flex-1 py-3.5 rounded-xl font-medium transition-colors hover:bg-white/5" style="background: rgba(255,255,255,0.05); color: var(--text-sub)">Hủy</button>
                <button data-action="saveAsset" id="btn-save-asset" class="flex-1 py-3.5 text-white font-bold rounded-xl shadow-lg active:scale-[0.98] transition-transform" style="background: var(--accent-gradient);">Lưu</button>
            </div>
        </div>
    </div>
